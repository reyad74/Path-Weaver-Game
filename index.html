<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path Weaver</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>

body{
background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
color: #ffffff;
font-family: 'Orbitron', monospace;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
margin: 0;
padding: clamp(10px, 5vw, 20px);
box-sizing: border-box;
width: 100%;
}

h1{
color: #00d4ff;
text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff;
font-size: clamp(1.5rem, 8vw, 3rem);
font-weight: 900;
margin-bottom: 20px;
letter-spacing: 2px;
animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
from { text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff; }
to { text-shadow: 0 0 30px #00d4ff, 0 0 50px #00d4ff, 0 0 70px #00d4ff; }
}

.stats{
margin-bottom: 30px;
font-size: clamp(0.9rem, 4vw, 1.2rem);
font-weight: 400;
background: rgba(0, 212, 255, 0.1);
padding: clamp(8px, 2vw, 10px) clamp(15px, 4vw, 20px);
border-radius: 25px;
border: 1px solid #00d4ff;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

#grid{
display: grid;
gap: clamp(8px, 3vw, 20px);
padding: clamp(10px, 4vw, 30px);
background: rgba(255, 255, 255, 0.05);
border-radius: 20px;
border: 1px solid rgba(255, 255, 255, 0.1);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
max-width: 90vw;
overflow: auto;
justify-items: center;
}

.cell{
width: clamp(35px, 8vw, 80px);
height: clamp(35px, 8vw, 80px);
background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
border: 2px solid #333;
border-radius: 15px;
display: flex;
align-items: center;
justify-content: center;
font-size: clamp(6px, 2.5vw, 12px);
font-weight: bold;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
position: relative;
overflow: hidden;
aspect-ratio: 1 / 1;
}

.cell::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
opacity: 0;
transition: opacity 0.3s ease;
}

.cell:hover::before {
opacity: 1;
}

.cell:hover {
transform: scale(1.05);
box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
}

.start{
border: 3px solid #00d4ff;
color: #00d4ff;
background: linear-gradient(145deg, #001122, #002244);
text-shadow: 0 0 10px #00d4ff;
}

.end{
border: 3px solid #ff6b6b;
color: #ff6b6b;
background: linear-gradient(145deg, #220011, #440022);
text-shadow: 0 0 10px #ff6b6b;
}

.active{
background: linear-gradient(145deg, #00d4ff, #0099cc);
color: #000;
border-color: #00d4ff;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
transform: scale(1.1);
}

.path{
background: linear-gradient(145deg, #00d4ff, #0099cc);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

button{
margin-top: 30px;
padding: clamp(10px, 3vw, 15px) clamp(20px, 8vw, 40px);
font-family: 'Orbitron', monospace;
font-size: clamp(0.8rem, 3vw, 1rem);
font-weight: 700;
color: #fff;
background: linear-gradient(145deg, #ff6b6b, #ee5a52);
border: none;
border-radius: 25px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
text-transform: uppercase;
letter-spacing: 1px;
}

button:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
background: linear-gradient(145deg, #ee5a52, #dc4545);
}

button:active {
transform: translateY(0);
}

/* Responsive breakpoints */
@media (max-width: 1024px) {
.controls {
flex-direction: row;
justify-content: center;
}
}

@media (max-width: 768px) {
h1 {
font-size: clamp(1.8rem, 6vw, 2.5rem);
}
.cell {
width: clamp(40px, 10vw, 60px);
height: clamp(40px, 10vw, 60px);
}
#grid {
gap: clamp(10px, 2vw, 15px);
padding: clamp(15px, 3vw, 20px);
}
.stats {
font-size: clamp(0.95rem, 3vw, 1.1rem);
}
.controls {
flex-direction: column;
gap: 15px;
}
}

@media (max-width: 480px) {
body {
padding: 10px;
}
h1 {
font-size: clamp(1.5rem, 7vw, 2rem);
margin-bottom: 15px;
}
.cell {
width: clamp(35px, 12vw, 50px);
height: clamp(35px, 12vw, 50px);
font-size: clamp(5px, 2vw, 8px);
}
#grid {
gap: clamp(5px, 1.5vw, 10px);
padding: clamp(10px, 2vw, 15px);
max-width: 95vw;
}
.stats {
font-size: clamp(0.85rem, 3.5vw, 1rem);
padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 15px);
margin-bottom: 20px;
}
.controls {
gap: 10px;
}
.sound-toggle {
width: 40px;
height: 40px;
font-size: 1rem;
}
}

@media (max-width: 360px) {
.cell {
width: clamp(30px, 14vw, 40px);
height: clamp(30px, 14vw, 40px);
font-size: clamp(4px, 2vw, 6px);
}
#grid {
gap: 4px;
padding: 8px;
}
.stats {
font-size: 0.8rem;
}
button {
padding: 8px 15px;
font-size: 0.75rem;
}
}

/* Landscape orientation for phones */
@media (max-height: 500px) and (orientation: landscape) {
body {
padding: 5px;
min-height: auto;
height: 100vh;
}
h1 {
font-size: clamp(1.2rem, 4vw, 1.8rem);
margin-bottom: 10px;
}
#grid {
padding: clamp(5px, 2vw, 10px);
max-width: 80vw;
}
.cell {
width: clamp(25px, 6vw, 40px);
height: clamp(25px, 6vw, 40px);
font-size: clamp(4px, 1.5vw, 6px);
}
.controls {
flex-direction: row;
gap: 10px;
margin-top: 10px;
}
.stats {
margin-bottom: 15px;
font-size: clamp(0.7rem, 2.5vw, 0.9rem);
}
}

/* Large screens */
@media (min-width: 1200px) {
.cell {
width: clamp(70px, 6vw, 90px);
height: clamp(70px, 6vw, 90px);
font-size: clamp(10px, 1vw, 14px);
}
#grid {
gap: clamp(15px, 1.5vw, 25px);
padding: clamp(25px, 3vw, 40px);
}
}

/* Ultra-wide screens */
@media (min-width: 1920px) {
.cell {
width: 100px;
height: 100px;
font-size: 14px;
}
#grid {
gap: 30px;
padding: 50px;
max-width: 1200px;
}
}

/* Controls */
.controls {
display: flex;
gap: 20px;
margin-top: 20px;
}
.modal {
display: none;
position: fixed;
z-index: 1000;
left: 0;
top: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.8);
backdrop-filter: blur(5px);
-webkit-backdrop-filter: blur(5px);
}

.modal-content {
background: linear-gradient(145deg, #1a1a2e, #16213e);
margin: 15% auto;
padding: clamp(20px, 5vw, 30px);
border: 1px solid #00d4ff;
border-radius: 20px;
width: 90%;
max-width: 400px;
text-align: center;
box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
animation: modalAppear 0.5s ease-out;
}

@keyframes modalAppear {
from { opacity: 0; transform: scale(0.8); }
to { opacity: 1; transform: scale(1); }
}

.modal h2 {
color: #00d4ff;
margin-bottom: 20px;
font-size: 2rem;
text-shadow: 0 0 20px #00d4ff;
}

.modal p {
margin-bottom: 30px;
font-size: 1.1rem;
}

.modal-buttons {
display: flex;
gap: 15px;
justify-content: center;
}

.modal-buttons button {
padding: 12px 25px;
font-size: 0.9rem;
}

/* Controls */
.controls {
display: flex;
gap: 20px;
margin-top: 20px;
}

.controls button {
margin: 0;
}

/* Sound toggle */
.sound-toggle {
position: absolute;
top: clamp(10px, 2vw, 20px);
right: clamp(10px, 2vw, 20px);
background: rgba(0, 212, 255, 0.1);
border: 1px solid #00d4ff;
border-radius: 50%;
width: clamp(40px, 8vw, 50px);
height: clamp(40px, 8vw, 50px);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: clamp(1rem, 3vw, 1.2rem);
transition: all 0.3s ease;
z-index: 100;
}

.sound-toggle:hover {
background: rgba(0, 212, 255, 0.2);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

.sound-toggle.muted {
opacity: 0.5;
}

</style>
</head>

<body>

<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>

<h1>PATH WEAVER</h1>

<div class="stats">
Level: <span id="level">1</span> |
Grid: <span id="gridSize">3x3</span> |
Moves: <span id="moves">0</span>
</div>

<p style="text-align: center; margin: 10px 0; font-size: 0.9rem; opacity: 0.8;">Draw a path from START to END, visiting all cells!</p>

<div id="grid"></div>

<div class="controls">
<button onclick="nextLevel()">Next Level</button>
<button onclick="restartGame()">Restart</button>
</div>

<!-- Win Modal -->
<div id="winModal" class="modal">
<div class="modal-content">
<h2>LEVEL CLEARED!</h2>
<p>Great job! Ready for the next challenge?</p>
<div class="modal-buttons">
<button onclick="nextLevel()">Next Level</button>
<button onclick="closeModal()">Stay Here</button>
</div>
</div>
</div>

<script>

// Audio context for sound effects
let audioContext;
let soundEnabled = localStorage.getItem('pathWeaverSound') !== 'false'; // Default true
let moveSound, winSound;
let audioInitialized = false;

function initAudio() {
if (audioInitialized) return;

try {
if (typeof AudioContext !== 'undefined') {
audioContext = new AudioContext();
} else if (typeof webkitAudioContext !== 'undefined') {
audioContext = new webkitAudioContext();
}

if (audioContext) {
if (audioContext.state === 'suspended') {
// Resume audio context on user interaction
const resumeAudio = () => {
audioContext.resume().then(() => {
audioInitialized = true;
createSounds();
document.removeEventListener('click', resumeAudio);
document.removeEventListener('touchstart', resumeAudio);
});
};
document.addEventListener('click', resumeAudio, { once: true });
document.addEventListener('touchstart', resumeAudio, { once: true });
} else {
audioInitialized = true;
createSounds();
}
}
} catch (e) {
console.warn('Audio not supported:', e);
audioInitialized = true; // Mark as initialized to prevent retries
}
}

function createSounds() {
if (!audioContext) return;

// Create simple sound effects using oscillators
moveSound = createBeep(220, 0.08, 'sine');
winSound = createBeep(440, 0.4, 'triangle');
}

function createBeep(frequency, duration, type) {
return function() {
if (!audioContext || !soundEnabled || audioContext.state !== 'running') return;
try {
const oscillator = audioContext.createOscillator();
const gainNode = audioContext.createGain();

oscillator.connect(gainNode);
gainNode.connect(audioContext.destination);

oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
oscillator.type = type;

gainNode.gain.setValueAtTime(0.08, audioContext.currentTime);
gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

oscillator.start(audioContext.currentTime);
oscillator.stop(audioContext.currentTime + duration);
} catch (e) {
console.warn('Sound playback failed:', e);
}
};
}

function toggleSound() {
soundEnabled = !soundEnabled;
localStorage.setItem('pathWeaverSound', soundEnabled);
const toggle = document.getElementById('soundToggle');
toggle.innerText = soundEnabled ? '🔊' : '🔇';
toggle.classList.toggle('muted');
if (soundEnabled && !audioInitialized) {
initAudio();
}
}

let level=1
let size=3
let path=[]
let isDrawing=false
let endIndex=0
let moves=0

const grid=document.getElementById("grid")
const levelEl=document.getElementById("level")
const gridSizeEl=document.getElementById("gridSize")
const movesEl=document.getElementById("moves")
const winModal=document.getElementById("winModal")

// Initialize sound toggle after DOM is ready
document.addEventListener('DOMContentLoaded', () => {
const soundToggle = document.getElementById('soundToggle');
if (soundToggle) {
soundToggle.innerText = soundEnabled ? '🔊' : '🔇';
if (!soundEnabled) soundToggle.classList.add('muted');
}
});

initAudio()
initGame()

// Keyboard support
document.addEventListener('keydown', (e) => {
if (e.key === 'r' || e.key === 'R') {
e.preventDefault();
restartGame();
} else if (e.key === 'n' || e.key === 'N') {
e.preventDefault();
nextLevel();
} else if (e.key === 'Escape') {
e.preventDefault();
closeModal();
} else if (e.key === 'm' || e.key === 'M') {
e.preventDefault();
toggleSound();
}
});

function initGame(){

size=2+level
if(size>10) size=10  // Allow larger grids

levelEl.innerText=level
gridSizeEl.innerText=size+"x"+size
movesEl.innerText=moves=0

grid.innerHTML=""
grid.style.gridTemplateColumns=`repeat(${size},1fr)`

path=[]

// Generate solvable END
let attempts = 0;
do{
endIndex = Math.floor(Math.random() * (size * size - 1)) + 1;
attempts++;
if (attempts > 50) {
endIndex = size * size - 1; // Fallback to bottom-right corner
break;
}
}while(!isSolvable(endIndex));

for(let i=0;i<size*size;i++){

const cell=document.createElement("div")
cell.classList.add("cell")
cell.dataset.index=i

if(i===0){
cell.classList.add("start")
cell.innerText="START"
}

if(i===endIndex){
cell.classList.add("end")
cell.innerText="END"
}

cell.addEventListener("mousedown",(e)=>{
e.preventDefault()
startDraw(i)
})
cell.addEventListener("mouseenter",()=>moveDraw(i))

cell.addEventListener("touchstart",(e)=>{
e.preventDefault()
e.stopPropagation()
startDraw(i)
}, { passive: false })

cell.addEventListener("touchend",(e)=>{
e.preventDefault()
}, { passive: false })

grid.appendChild(cell)

}

}

function isSolvable(end){
const startColor = (0 + 0) % 2
const endColor = (Math.floor(end/size) + end % size) % 2
const total = size * size

// For even grids, ensure different colors (basic check)
if(total % 2 === 0){
return startColor !== endColor
}

// For odd grids, ensure end is not start
return end !== 0
}

function startDraw(idx){

if(idx!==0 || isDrawing) return

isDrawing=true
path=[idx]
moves++

updateUI()

if(moveSound && typeof moveSound === 'function') moveSound()

}

function moveDraw(idx){

if(!isDrawing) return

const last=path[path.length-1]

if(idx===last) return

const r=Math.floor(idx/size)
const c=idx%size

const lr=Math.floor(last/size)
const lc=last%size

const adjacent=Math.abs(r-lr)+Math.abs(c-lc)===1

if(adjacent){

if(!path.includes(idx)){

path.push(idx)
moves++
updateUI()
checkWin(idx)

if(moveSound && typeof moveSound === 'function') moveSound()

}

else if(idx===path[path.length-2]){

path.pop()
moves++
updateUI()

if(moveSound && typeof moveSound === 'function') moveSound()

}

}

}

window.addEventListener("touchmove",(e)=>{

if(!isDrawing) return

e.preventDefault()

const touch = e.touches[0]
if (!touch) return

const el = document.elementFromPoint(touch.clientX, touch.clientY)

if(el && el.classList.contains("cell")){
const idx = parseInt(el.dataset.index)
if (!isNaN(idx)) {
moveDraw(idx)
}
}

},{passive:false})

function updateUI(){

const cells=document.querySelectorAll(".cell")

cells.forEach(c=>{
c.classList.remove("active","path")
})

path.forEach((idx,i)=>{

cells[idx].classList.add("active")

if(i<path.length-1){
cells[idx].classList.add("path")
}

})

movesEl.innerText=moves

}

function checkWin(idx){

const total=size*size

if(idx===endIndex && path.length===total){

if(winSound && typeof winSound === 'function') winSound()

setTimeout(()=>{
showModal()
},300)

isDrawing=false

}

}

function showModal(){
winModal.style.display="flex"
}

function closeModal(){
winModal.style.display="none"
}

function nextLevel(){

closeModal()
level++
initGame()

}

function restartGame(){

level=1
initGame()

}

window.addEventListener("mouseup",stopDraw)
window.addEventListener("touchend",stopDraw)

function stopDraw(){

if(!isDrawing) return

isDrawing=false

const total=size*size

if(path.length<total || path[path.length-1]!==endIndex){

path=[]
updateUI()

}

}

// Close modal when clicking outside
winModal.addEventListener("click",(e)=>{
if(e.target===winModal){
closeModal()
}
})

</script>

</body>
</html>
